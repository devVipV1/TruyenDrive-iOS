name: Build IPA

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Schemes
        run: |
          xcodebuild -list -project truyendrive.xcodeproj

      - name: Build
        run: |
          xcodebuild \
          -project truyendrive.xcodeproj \
          -scheme truyendrive \
          -configuration Release \
          -sdk iphoneos \
          build

      - name: Archive Build Output
        run: |
          mkdir output
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -exec cp -R {} output/ \; || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TruyenDrive-Build
          path: output
