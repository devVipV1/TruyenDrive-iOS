name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Project Info
        run: |
          xcodebuild -list -project truyendrive.xcodeproj

      - name: Build Unsigned App
        run: |
          xcodebuild \
            -project truyendrive.xcodeproj \
            -scheme truyendrive \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Find App
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found app: $APP_PATH"

      - name: Create IPA
        run: |
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -r TruyenDrive-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TruyenDrive-Unsigned-IPA
          path: TruyenDrive-unsigned.ipa
